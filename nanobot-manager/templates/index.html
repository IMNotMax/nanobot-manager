<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nanobot Manager</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #38bdf8;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .current-badge {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 2rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .current-badge span {
            color: #38bdf8;
            font-weight: 600;
        }

        .field {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        select,
        input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 0.6rem 0.75rem;
            color: #e2e8f0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus,
        input:focus {
            border-color: #38bdf8;
        }

        .model-row {
            display: flex;
            gap: 0.5rem;
        }

        .model-row select {
            flex: 1;
        }

        .model-row input {
            flex: 1;
            display: none;
        }

        .toggle-btn {
            background: #334155;
            border: none;
            color: #94a3b8;
            padding: 0 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .toggle-btn:hover {
            background: #475569;
        }

        .divider {
            border: none;
            border-top: 1px solid #334155;
            margin: 1.5rem 0;
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #0ea5e9;
            color: white;
            margin-bottom: 0.75rem;
        }

        .btn-primary:hover {
            background: #38bdf8;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-danger:hover {
            background: #ef4444;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .toast {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            display: none;
        }

        .toast.success {
            background: #064e3b;
            color: #6ee7b7;
            border: 1px solid #065f46;
        }

        .toast.error {
            background: #450a0a;
            color: #fca5a5;
            border: 1px solid #7f1d1d;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>⚙️ Nanobot Manager</h1>
        <p class="subtitle">Gérez la configuration du modèle IA de Nanobot</p>

        <div class="current-badge">
            Config actuelle — Provider : <span id="cur-provider">{{ current_provider }}</span> &nbsp;|&nbsp; Modèle :
            <span id="cur-model">{{ current_model }}</span>
        </div>

        <div class="field">
            <label>Provider</label>
            <select id="provider">
                <option value="custom" {% if current_provider=='custom' %}selected{% endif %}>custom (Ollama local)
                </option>
                <option value="openai" {% if current_provider=='openai' %}selected{% endif %}>openai</option>
                <option value="anthropic" {% if current_provider=='anthropic' %}selected{% endif %}>anthropic</option>
                <option value="ollama" {% if current_provider=='ollama' %}selected{% endif %}>ollama</option>
            </select>
        </div>

        <div class="field">
            <label>Modèle</label>
            <div class="model-row">
                <select id="model-select">
                    {% for m in ollama_models %}
                    <option value="{{ m }}" {% if m==current_model %}selected{% endif %}>{{ m }}</option>
                    {% endfor %}
                    <option value="__manual__">✏️ Saisir manuellement...</option>
                </select>
                <input type="text" id="model-manual" placeholder="ex: gpt-4o" value="{{ current_model }}">
                <button class="toggle-btn" id="toggle-mode" onclick="toggleManual()">Manuel</button>
            </div>
        </div>

        <hr class="divider">

        <button class="btn btn-primary" id="btn-save" onclick="saveConfig()">💾 Sauvegarder la configuration</button>
        <button class="btn btn-danger" id="btn-restart" onclick="restartContainer()">🔄 Restart nanobot-gateway</button>

        <div id="toast" class="toast"></div>
    </div>

    <script>
        let manualMode = false;
        const modelSelect = document.getElementById('model-select');
        const modelManual = document.getElementById('model-manual');

        // Init: si le modèle actuel n'est pas dans la liste, passer en manuel
        const currentModel = "{{ current_model }}";
        const options = Array.from(modelSelect.options).map(o => o.value).filter(v => v !== '__manual__');
        if (currentModel && !options.includes(currentModel)) {
            switchToManual();
        }

        modelSelect.addEventListener('change', () => {
            if (modelSelect.value === '__manual__') switchToManual();
        });

        function switchToManual() {
            manualMode = true;
            modelSelect.style.display = 'none';
            modelManual.style.display = 'block';
            document.getElementById('toggle-mode').textContent = 'Liste';
            modelManual.focus();
        }

        function toggleManual() {
            if (manualMode) {
                manualMode = false;
                modelSelect.style.display = 'block';
                modelManual.style.display = 'none';
                document.getElementById('toggle-mode').textContent = 'Manuel';
            } else {
                switchToManual();
            }
        }

        function getModel() {
            return manualMode ? modelManual.value.trim() : modelSelect.value;
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type}`;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 4000);
        }

        async function saveConfig() {
            const btn = document.getElementById('btn-save');
            const model = getModel();
            const provider = document.getElementById('provider').value;
            if (!model) return showToast('Veuillez saisir un modèle', 'error');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Sauvegarde...';
            try {
                const res = await fetch('/api/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model, provider })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                    document.getElementById('cur-model').textContent = model;
                    document.getElementById('cur-provider').textContent = provider;
                } else {
                    showToast('Erreur : ' + data.error, 'error');
                }
            } catch (e) {
                showToast('Erreur réseau', 'error');
            }
            btn.disabled = false;
            btn.innerHTML = '💾 Sauvegarder la configuration';
        }

        async function restartContainer() {
            const btn = document.getElementById('btn-restart');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Restart en cours...';
            try {
                const res = await fetch('/api/restart', { method: 'POST' });
                const data = await res.json();
                showToast(data.success ? data.message : 'Erreur : ' + data.error, data.success ? 'success' : 'error');
            } catch (e) {
                showToast('Erreur réseau', 'error');
            }
            btn.disabled = false;
            btn.innerHTML = '🔄 Restart nanobot-gateway';
        }
    </script>
</body>

</html>
